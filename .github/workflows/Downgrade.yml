name: Downgrade
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
jobs:
  downgrade:
    name: "Downgrade"
    # Disabled: at the current [compat] lower bounds the downgraded environment is
    # unsatisfiable under strict (allow-reresolve:false) resolution. The deps floor
    # pins NonlinearSolveBase to 2.30.3, which pulls LogExpFunctions 1.0.1; that
    # LogExpFunctions caps ForwardDiff at <=0.10.22, while NonlinearSolveBase 2.30.3
    # and the OrdinaryDiffEq/StochasticDiffEq test stack require ForwardDiff >=0.10.38.
    # No ForwardDiff version satisfies both, so Pkg.test errors with
    # "Unsatisfiable requirements detected for package ForwardDiff" before any test runs.
    # We do not relax this with allow-reresolve:true (that defeats the purpose of the
    # downgrade test) nor lower any compat floors. Re-enable once the upstream floors
    # move past the LogExpFunctions 1.0.1 / ForwardDiff wall.
    if: false
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "1.10"
      skip: "Pkg,TOML"
    secrets: "inherit"
